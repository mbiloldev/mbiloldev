<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Muhammadbilol GitHub Profile Banner</title>
<desc>Animated banner for mbiloldev GitHub profile</desc>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0a0a0f"/>
    <stop offset="100%" stop-color="#1a1030"/>
  </linearGradient>
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ffd27a"/>
    <stop offset="50%" stop-color="#f19e36"/>
    <stop offset="100%" stop-color="#c97a1a"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="680" height="200" rx="16" fill="url(#bg)"/>

<!-- Animated grid lines -->
<g stroke="#f19e36" stroke-width="0.5">
  <line x1="0" y1="40" x2="680" y2="40" opacity="0.08"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/></line>
  <line x1="0" y1="80" x2="680" y2="80" opacity="0.08"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/></line>
  <line x1="0" y1="120" x2="680" y2="120" opacity="0.08"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/></line>
  <line x1="0" y1="160" x2="680" y2="160" opacity="0.08"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/></line>
  <line x1="136" y1="0" x2="136" y2="200" opacity="0.08"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/></line>
  <line x1="272" y1="0" x2="272" y2="200" opacity="0.08"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.2s" repeatCount="indefinite"/></line>
  <line x1="408" y1="0" x2="408" y2="200" opacity="0.08"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/></line>
  <line x1="544" y1="0" x2="544" y2="200" opacity="0.08"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.8s" repeatCount="indefinite"/></line>
</g>

<!-- Floating particles -->
<circle cx="60" cy="50" r="2" fill="#f19e36">
  <animate attributeName="cy" values="50;20;50" dur="4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="150" cy="170" r="1.5" fill="#ffd27a">
  <animate attributeName="cy" values="170;140;170" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
</circle>
<circle cx="300" cy="30" r="2.5" fill="#f19e36">
  <animate attributeName="cy" values="30;60;30" dur="3.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/>
</circle>
<circle cx="480" cy="160" r="2" fill="#ffd27a">
  <animate attributeName="cy" values="160;120;160" dur="4.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.6;1;0.6" dur="4.5s" repeatCount="indefinite"/>
</circle>
<circle cx="580" cy="80" r="1.5" fill="#f19e36">
  <animate attributeName="cy" values="80;40;80" dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0.9;0.4" dur="6s" repeatCount="indefinite"/>
</circle>
<circle cx="630" cy="150" r="2" fill="#ffd27a">
  <animate attributeName="cy" values="150;100;150" dur="3.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.8s" repeatCount="indefinite"/>
</circle>

<!-- Gold left accent bar -->
<rect x="36" y="55" width="4" height="90" rx="2" fill="url(#gold)">
  <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
</rect>

<!-- Main name -->
<text x="56" y="95" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="url(#gold)" filter="url(#glow)">Muhammadbilol</text>
<text x="56" y="130" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#ffffff">Qo'chqorov</text>

<!-- Role badges -->
<rect x="56" y="143" width="130" height="22" rx="11" fill="rgba(241,158,54,0.15)" stroke="#f19e36" stroke-width="0.8"/>
<text x="121" y="158" font-family="'Segoe UI', sans-serif" font-size="10" fill="#f19e36" text-anchor="middle" font-weight="600">Full-Stack Developer</text>

<rect x="196" y="143" width="120" height="22" rx="11" fill="rgba(100,180,255,0.1)" stroke="rgba(100,180,255,0.5)" stroke-width="0.8"/>
<text x="256" y="158" font-family="'Segoe UI', sans-serif" font-size="10" fill="#88ccff" text-anchor="middle" font-weight="600">Telegram Bot Creator</text>

<rect x="326" y="143" width="100" height="22" rx="11" fill="rgba(120,220,120,0.1)" stroke="rgba(120,220,120,0.5)" stroke-width="0.8"/>
<text x="376" y="158" font-family="'Segoe UI', sans-serif" font-size="10" fill="#88ee88" text-anchor="middle" font-weight="600">IT Mentor since 2023</text>

<!-- Right side code tag -->
<text x="490" y="58" font-family="'Courier New', monospace" font-size="14" fill="#f19e36" opacity="0.7">&lt;mbiloldev/&gt;
  <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
</text>

<!-- Tech pills row 1 -->
<rect x="490" y="70" width="50" height="18" rx="9" fill="rgba(241,158,54,0.2)" stroke="#f19e36" stroke-width="0.6"/>
<text x="515" y="82.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#f19e36" text-anchor="middle" font-weight="600">Python</text>

<rect x="548" y="70" width="62" height="18" rx="9" fill="rgba(241,158,54,0.15)" stroke="#f19e36" stroke-width="0.6"/>
<text x="579" y="82.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#ffd27a" text-anchor="middle" font-weight="600">JavaScript</text>

<!-- Tech pills row 2 -->
<rect x="490" y="95" width="48" height="18" rx="9" fill="rgba(100,180,255,0.15)" stroke="#88ccff" stroke-width="0.6"/>
<text x="514" y="107.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#88ccff" text-anchor="middle" font-weight="600">Django</text>

<rect x="546" y="95" width="38" height="18" rx="9" fill="rgba(100,180,255,0.12)" stroke="#88ccff" stroke-width="0.6"/>
<text x="565" y="107.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#88ccff" text-anchor="middle" font-weight="600">React</text>

<rect x="592" y="95" width="24" height="18" rx="9" fill="rgba(100,180,255,0.1)" stroke="#88ccff" stroke-width="0.6"/>
<text x="604" y="107.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#88ccff" text-anchor="middle" font-weight="600">JS</text>

<!-- Tech pills row 3 -->
<rect x="490" y="120" width="34" height="18" rx="9" fill="rgba(120,220,120,0.12)" stroke="#88ee88" stroke-width="0.6"/>
<text x="507" y="132.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#88ee88" text-anchor="middle" font-weight="600">C++</text>

<rect x="532" y="120" width="30" height="18" rx="9" fill="rgba(120,220,120,0.1)" stroke="#88ee88" stroke-width="0.6"/>
<text x="547" y="132.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#88ee88" text-anchor="middle" font-weight="600">C#</text>

<rect x="570" y="120" width="46" height="18" rx="9" fill="rgba(180,100,255,0.12)" stroke="#cc88ff" stroke-width="0.6"/>
<text x="593" y="132.5" font-family="'Segoe UI', sans-serif" font-size="9" fill="#cc88ff" text-anchor="middle" font-weight="600">aiogram</text>

<!-- Bottom social -->
<text x="56" y="188" font-family="'Segoe UI', sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">@it_mentor_uz  ·  github.com/mbiloldev</text>

<!-- Scanning line -->
<rect x="36" y="0" width="608" height="1" fill="url(#gold)" opacity="0.4">
  <animate attributeName="y" values="0;200;0" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.5;0" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Border glow -->
<rect x="1" y="1" width="678" height="198" rx="15" fill="none" stroke="#f19e36" stroke-width="0.8">
  <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
</rect>
</svg>
